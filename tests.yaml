    platform: "linux"
    env: { HOME: "/home/alice" }
    output: "$HOME/.my-legacy-tool"
    description: "Trim + collapse-whitespace-runs + lowercase applied in that order to one input — smoke test all three transforms at once"

  - name: "single-nbsp-not-collapsed"
    function: config_dir
    args: { app: "My App" }
    strategy: "single-folder"
    platform: "linux"
    env: { HOME: "/home/alice" }
    output: "$HOME/.my app"
    description: "Whitespace handling is ASCII-only per SPEC §Single-folder; NBSP (U+00A0) is NOT collapsed, only ASCII space/tab/newline are. The character passes through to the lowercasing step verbatim."

# =============================================================================
# Errors
# =============================================================================

errors:
  - name: "err-bad-strategy"
    function: config_dir
    args: { app: "MyApp" }
    strategy: "freedesktop"
    platform: "linux"
    env: { HOME: "/home/alice" }
    raises: true
    description: "Unknown strategy value"

  - name: "err-empty-strategy"
    function: config_dir
    args: { app: "MyApp" }
    strategy: ""
    platform: "linux"
    env: { HOME: "/home/alice" }
    raises: true
    description: "Empty-string strategy is invalid (must be one of the four named strategies or None)"

  - name: "err-empty-app"
    function: config_dir
    args: { app: "" }
    strategy: "xdg"
    platform: "linux"
    env: { HOME: "/home/alice" }
    raises: true

  - name: "err-null-app"
    function: config_dir
    args: { app: null }
    strategy: "xdg"
    platform: "linux"
    env: { HOME: "/home/alice" }
    raises: true

  - name: "err-app-with-nul-byte"
    function: config_dir
    args: { app: "My\0App" }
    strategy: "xdg"
    platform: "linux"
    env: { HOME: "/home/alice" }
    raises: true
    description: "App containing a NUL byte (U+0000) is rejected per SPEC §Error handling — would break path APIs on every platform"

  - name: "err-app-with-forward-slash"
    function: config_dir
    args: { app: "vendor/app" }
    strategy: "xdg"
    platform: "linux"
    env: { HOME: "/home/alice" }
    raises: true

  - name: "err-app-with-backslash"
    function: config_dir
    args: { app: "vendor\\app" }
    strategy: "windows"
    platform: "windows"
    env:
      LOCALAPPDATA: "C:/Users/alice/AppData/Local"
      USERPROFILE: "C:/Users/alice"
      HOME: "/Users/alice"
    raises: true
    description: "App-name validation must fire before env resolution; all env pinned to non-empty values to prove the fallback chain is never consulted — validation must reject the bad app before any env lookup happens"

  - name: "err-app-with-backslash-on-linux"
    function: config_dir
    args: { app: "vendor\\app" }
    strategy: "xdg"
    platform: "linux"
    env: { HOME: "/home/alice" }
    raises: true
    description: "Backslash in app is rejected on every platform, not just Windows"

  - name: "err-which-strategy-unknown-platform"
    function: which_strategy
    args: ["plan9"]
    raises: true

  - name: "err-which-strategy-empty-string"
    function: which_strategy
    args: [""]
    raises: true

  - name: "err-which-strategy-null"
    function: which_strategy
    args: [null]
    raises: true

  - name: "err-app-whitespace-only"
    function: config_dir
    args: { app: "   " }
    strategy: "single-folder"
    platform: "linux"
    env: { HOME: "/home/alice" }
    raises: true
    description: "Whitespace-only app would mangle to empty under single-folder, producing the malformed path ~/. — rejected per SPEC §Error handling"

  - name: "err-app-dot"
    function: config_dir
    args: { app: "." }
    strategy: "xdg"
    platform: "linux"
    env: { HOME: "/home/alice" }
    raises: true
    description: "app = '.' is path traversal-adjacent and rejected per SPEC §Error handling"

  - name: "err-app-dotdot"
    function: config_dir
    args: { app: ".." }
    strategy: "xdg"
    platform: "linux"
    env: { HOME: "/home/alice" }
    raises: true
    description: "app = '..' is path traversal and rejected per SPEC §Error handling"

  - name: "err-strategy-uppercase-xdg"
    function: config_dir
    args: { app: "MyApp" }
    strategy: "XDG"
    platform: "linux"
    env: { HOME: "/home/alice" }
    raises: true
    description: "Strategy names are case-sensitive; uppercase variants are rejected per SPEC §Error handling"

  - name: "err-windows-all-env-empty-raises"
    function: config_dir
    args: { app: "MyApp" }
    strategy: "windows"
    platform: "windows"
    env:
      LOCALAPPDATA: ""
      USERPROFILE: ""
      HOME: ""
    raises: true
    description: "When LOCALAPPDATA, USERPROFILE, and HOME are all unset/empty, the fallback chain is exhausted and the implementation raises per SPEC §Windows env-var resolution"

  - name: "err-xdg-home-empty-raises"
    function: config_dir
    args: { app: "MyApp" }
    strategy: "xdg"
    platform: "linux"
    env: { HOME: "" }
    raises: true
    description: "Under XDG, HOME being unset or empty is fatal — there is no fallback chain (unlike Windows). SPEC §XDG explicitly says raise."

# =============================================================================
# Project-specific test cases
# =============================================================================
# Add cases that exercise YOUR app's exact identity / platform mix here. These
# are the cases most likely to catch a generated implementation getting the
# wiring almost-but-not-quite right for your real-world use.
#
# Replace / extend these with cases matching the apps you actually plan to
# use wheredirs in. Each case must declare function, args, strategy (or null),
# platform, env, and output (or raises: true).

project:
  # A typical CLI tool: same app, all three auto-mode platforms.
  - name: "wheredirs-self-config-linux"
    function: config_dir
    args: { app: "wheredirs" }
    strategy: null
    platform: "linux"
    env: { HOME: "/home/dev" }
    output: "$HOME/.config/wheredirs"

  - name: "wheredirs-self-config-macos-auto"
    function: config_dir
    args: { app: "wheredirs" }
    strategy: null
    platform: "macos"
    env: { HOME: "/Users/dev" }
    output: "$HOME/Library/Application Support/wheredirs"
    description: "macOS auto-mode picks the native Apple layout"

  - name: "wheredirs-self-config-macos-xdg-opt-in"
    function: config_dir
    args: { app: "wheredirs" }
    strategy: "xdg"
    platform: "macos"
    env: { HOME: "/Users/dev" }
    output: "$HOME/.config/wheredirs"
    description: "Cross-platform CLI tools that want one layout everywhere pass strategy='xdg' explicitly"

  - name: "wheredirs-self-config-macos-apple"
    function: config_dir
    args: { app: "wheredirs" }
    strategy: "apple"
    platform: "macos"
    env: { HOME: "/Users/dev" }
    output: "$HOME/Library/Application Support/wheredirs"

  - name: "wheredirs-self-config-windows"
    function: config_dir
    args: { app: "wheredirs", author: "hasansezertasan" }
    strategy: null
    platform: "windows"
    env:
      LOCALAPPDATA: "C:/Users/dev/AppData/Local"
      USERPROFILE: ""
      HOME: ""
    output: "$LOCALAPPDATA/hasansezertasan/wheredirs"

  # Author with spaces preserved verbatim through path-join on Windows.
  - name: "windows-author-with-space"
    function: logs_dir
    args: { app: "MyApp", author: "Acme Corp" }
    strategy: "windows"
    platform: "windows"
    env:
      LOCALAPPDATA: "C:/Users/dev/AppData/Local"
      USERPROFILE: ""
      HOME: ""
    output: "$LOCALAPPDATA/Acme Corp/MyApp/Logs"
    description: "Author with space + Logs suffix on Windows; space in author is preserved (Windows path-join is verbatim, no normalization)"

  # Headless server: XDG state with a custom XDG_STATE_HOME.
  - name: "server-state-custom-xdg"
    function: state_dir
    args: { app: "my-daemon" }
    strategy: "xdg"
    platform: "linux"
    env:
      HOME: "/var/lib/daemon"
      XDG_STATE_HOME: "/var/lib/daemon/state"
    output: "$XDG_STATE_HOME/my-daemon"

  # Single-folder for a legacy dotfile-style tool.
  - name: "dotfile-style-single-folder"
    function: data_dir
    args: { app: "Legacy Tool" }
    strategy: "single-folder"
    platform: "linux"
    env: { HOME: "/home/dev" }
    output: "$HOME/.legacy-tool"
    description: "single-folder lowercases and dash-replaces spaces"
