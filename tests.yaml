# wheredirs Test Suite
# Language-agnostic test cases. See SPEC.md for the complete behavioral specification.
#
# Each case declares all inputs that affect the output: args + strategy + platform + env.
# Expected `output` uses placeholders ($HOME, $XDG_CONFIG_HOME, $LOCALAPPDATA, ...) that match
# keys in the `env` block. The test runner substitutes those placeholders before comparing
# to the implementation's return value.
#
# Variables not declared in `env` are treated as unset. Some cases below also
# pin variables to the empty string explicitly (e.g. `USERPROFILE: ""` on a
# Windows happy-path case where the fallback chain should never fire) — those
# explicit pins are redundant with the rule above but make intent unambiguous
# and immune to a sloppy runner that leaks ambient host env vars.

version: "0.1.0"

# =============================================================================
# which_strategy
# =============================================================================
#
# which_strategy cases use `args` (positional), no `env`, no `platform` —
# the function takes the platform name as its only argument and consults no
# ambient state. Runners should treat absent `env` / `platform` as "not
# applicable" rather than reading the host's real values.

which_strategy:
  - name: "linux-picks-xdg"
    function: which_strategy
    args: ["linux"]
    output: "xdg"
  - name: "macos-picks-apple"
    function: which_strategy
    args: ["macos"]
    output: "apple"
    description: "Auto-mode on macOS picks the native Apple layout"
  - name: "darwin-alias-of-macos"
    function: which_strategy
    args: ["darwin"]
    output: "apple"
  - name: "windows-picks-windows"
    function: which_strategy
    args: ["windows"]
    output: "windows"
  - name: "win32-alias-of-windows"
    function: which_strategy
    args: ["win32"]
    output: "windows"
  - name: "freebsd-picks-xdg"
    function: which_strategy
    args: ["freebsd"]
    output: "xdg"
  - name: "openbsd-picks-xdg"
    function: which_strategy
    args: ["openbsd"]
    output: "xdg"
  - name: "netbsd-picks-xdg"
    function: which_strategy
    args: ["netbsd"]
    output: "xdg"
  - name: "dragonfly-picks-xdg"
    function: which_strategy
    args: ["dragonfly"]
    output: "xdg"

# =============================================================================
# XDG strategy (explicit and auto on linux/macOS)
# =============================================================================

xdg:
  # ---- defaults (no XDG_* set) -----------------------------------------------

  - name: "xdg-config-default"
    function: config_dir
    args: { app: "MyApp" }
    strategy: "xdg"
    platform: "linux"
    env: { HOME: "/home/alice" }
    output: "$HOME/.config/MyApp"

  - name: "xdg-data-default"
    function: data_dir
    args: { app: "MyApp" }
    strategy: "xdg"
    platform: "linux"
    env: { HOME: "/home/alice" }
    output: "$HOME/.local/share/MyApp"

  - name: "xdg-cache-default"
    function: cache_dir
    args: { app: "MyApp" }
    strategy: "xdg"
    platform: "linux"
    env: { HOME: "/home/alice" }
    output: "$HOME/.cache/MyApp"

  - name: "xdg-state-default"
    function: state_dir
    args: { app: "MyApp" }
    strategy: "xdg"
    platform: "linux"
    env: { HOME: "/home/alice" }
    output: "$HOME/.local/state/MyApp"

  - name: "xdg-logs-under-state"
    function: logs_dir
    args: { app: "MyApp" }
    strategy: "xdg"
    platform: "linux"
    env: { HOME: "/home/alice" }
    output: "$HOME/.local/state/MyApp/logs"

  - name: "xdg-runtime-set"
    function: runtime_dir
    args: { app: "MyApp" }
    strategy: "xdg"
    platform: "linux"
    env: { HOME: "/home/alice", XDG_RUNTIME_DIR: "/run/user/1000" }
    output: "$XDG_RUNTIME_DIR/MyApp"

  - name: "xdg-runtime-fallback-to-cache"
    function: runtime_dir
    args: { app: "MyApp" }
    strategy: "xdg"
    platform: "linux"
    env: { HOME: "/home/alice" }
    output: "$HOME/.cache/MyApp"
    description: "XDG_RUNTIME_DIR unset -> falls back to cache_dir"

  # ---- XDG_* env vars set ----------------------------------------------------

  - name: "xdg-config-honors-env"
    function: config_dir
    args: { app: "MyApp" }
    strategy: "xdg"
    platform: "linux"
    env: { HOME: "/home/alice", XDG_CONFIG_HOME: "/tmp/cfg" }
    output: "$XDG_CONFIG_HOME/MyApp"

  - name: "xdg-data-honors-env"
    function: data_dir
    args: { app: "MyApp" }
    strategy: "xdg"
    platform: "linux"
    env: { HOME: "/home/alice", XDG_DATA_HOME: "/srv/data" }
    output: "$XDG_DATA_HOME/MyApp"

  - name: "xdg-cache-honors-env"
    function: cache_dir
    args: { app: "MyApp" }
    strategy: "xdg"
    platform: "linux"
    env: { HOME: "/home/alice", XDG_CACHE_HOME: "/var/cache/alice" }
    output: "$XDG_CACHE_HOME/MyApp"

  - name: "xdg-state-honors-env"
    function: state_dir
    args: { app: "MyApp" }
    strategy: "xdg"
    platform: "linux"
    env: { HOME: "/home/alice", XDG_STATE_HOME: "/var/state/alice" }
    output: "$XDG_STATE_HOME/MyApp"

  - name: "xdg-logs-tracks-state-env"
    function: logs_dir
    args: { app: "MyApp" }
    strategy: "xdg"
    platform: "linux"
    env: { HOME: "/home/alice", XDG_STATE_HOME: "/var/state/alice" }
    output: "$XDG_STATE_HOME/MyApp/logs"

  # ---- empty / relative env vars (per XDG spec: treated as unset) -----------

  - name: "xdg-config-empty-env-is-unset"
    function: config_dir
    args: { app: "MyApp" }
    strategy: "xdg"
    platform: "linux"
    env: { HOME: "/home/alice", XDG_CONFIG_HOME: "" }
    output: "$HOME/.config/MyApp"

  - name: "xdg-config-relative-env-is-unset"
    function: config_dir
    args: { app: "MyApp" }
    strategy: "xdg"
    platform: "linux"
    env: { HOME: "/home/alice", XDG_CONFIG_HOME: "relative/path" }
    output: "$HOME/.config/MyApp"
    description: "Non-absolute XDG_CONFIG_HOME is treated as unset per XDG spec"

  - name: "xdg-cache-trailing-slash-stripped"
    function: cache_dir
    args: { app: "MyApp" }
    strategy: "xdg"
    platform: "linux"
    env: { HOME: "/home/alice", XDG_CACHE_HOME: "/var/cache/alice/" }
    output: "$XDG_CACHE_HOME/MyApp"
    description: "Trailing slash on env var stripped before joining"

  - name: "xdg-runtime-trailing-slash-stripped"
    function: runtime_dir
    args: { app: "MyApp" }
    strategy: "xdg"
    platform: "linux"
    env: { HOME: "/home/alice", XDG_RUNTIME_DIR: "/run/user/1000/" }
    output: "$XDG_RUNTIME_DIR/MyApp"

  - name: "xdg-runtime-relative-is-unset"
    function: runtime_dir
    args: { app: "MyApp" }
    strategy: "xdg"
    platform: "linux"
    env: { HOME: "/home/alice", XDG_RUNTIME_DIR: "tmp/runtime" }
    output: "$HOME/.cache/MyApp"
    description: "Non-absolute XDG_RUNTIME_DIR is treated as unset and falls back to cache_dir"

  - name: "xdg-config-app-with-space-preserved"
    function: config_dir
    args: { app: "My App" }
    strategy: "xdg"
    platform: "linux"
    env: { HOME: "/home/alice" }
    output: "$HOME/.config/My App"
    description: "App name preserved verbatim on XDG (no mangling)"

  # ---- author is ignored on XDG ---------------------------------------------

  - name: "xdg-config-author-ignored"
    function: config_dir
    args: { app: "MyApp", author: "Acme" }
    strategy: "xdg"
    platform: "linux"
    env: { HOME: "/home/alice" }
    output: "$HOME/.config/MyApp"

  # ---- auto-mode on linux selects XDG ---------------------------------------

  - name: "xdg-auto-on-linux"
    function: config_dir
    args: { app: "MyApp" }
    strategy: null
    platform: "linux"
    env: { HOME: "/home/alice" }
    output: "$HOME/.config/MyApp"

  - name: "xdg-explicit-on-macos"
    function: config_dir
    args: { app: "MyApp" }
    strategy: "xdg"
    platform: "macos"
    env: { HOME: "/Users/alice" }
    output: "$HOME/.config/MyApp"
    description: "Explicit strategy='xdg' on macOS is legal and gives the same path as on Linux — useful for cross-platform CLI tooling that wants one layout everywhere"

  # ---- BSD auto-mode dir resolution (matches which_strategy) ----------------

  - name: "xdg-auto-on-freebsd"
    function: config_dir
    args: { app: "MyApp" }
    strategy: null
    platform: "freebsd"
    env: { HOME: "/home/alice" }
    output: "$HOME/.config/MyApp"
    description: "Auto-mode on BSDs picks xdg too; guards against hard-coding only linux/macos"

  # ---- runtime fallback edge cases ------------------------------------------

  - name: "xdg-runtime-empty-is-unset"
    function: runtime_dir
    args: { app: "MyApp" }
    strategy: "xdg"
    platform: "linux"
    env: { HOME: "/home/alice", XDG_RUNTIME_DIR: "" }
    output: "$HOME/.cache/MyApp"
    description: "Empty XDG_RUNTIME_DIR is treated as unset and falls back to cache_dir"

  # ---- explicit strategy is legal on any platform ---------------------------

  - name: "xdg-explicit-on-windows"
    function: config_dir
    args: { app: "MyApp" }
    strategy: "xdg"
    platform: "windows"
    env: { HOME: "C:/Users/alice" }
    output: "$HOME/.config/MyApp"
    description: "strategy='xdg' on a windows platform is legal; platform only matters for auto-mode"

# =============================================================================
# Apple strategy (opt-in)
# =============================================================================

apple:
  - name: "apple-config"
    function: config_dir
    args: { app: "MyApp" }
    strategy: "apple"
    platform: "macos"
    env: { HOME: "/Users/alice" }
    output: "$HOME/Library/Application Support/MyApp"

  - name: "apple-data-same-as-config"
    function: data_dir
    args: { app: "MyApp" }
    strategy: "apple"
    platform: "macos"
    env: { HOME: "/Users/alice" }
    output: "$HOME/Library/Application Support/MyApp"

  - name: "apple-cache"
    function: cache_dir
    args: { app: "MyApp" }
    strategy: "apple"
    platform: "macos"
    env: { HOME: "/Users/alice" }
    output: "$HOME/Library/Caches/MyApp"

  - name: "apple-state-is-null"
    function: state_dir
    args: { app: "MyApp" }
    strategy: "apple"
    platform: "macos"
    env: { HOME: "/Users/alice" }
    output: null
    description: "Apple has no state_dir concept; wheredirs returns null rather than aliasing to Application Support"

  - name: "apple-state-with-author-still-null"
    function: state_dir
    args: { app: "MyApp", author: "Acme" }
    strategy: "apple"
    platform: "macos"
    env: { HOME: "/Users/alice" }
    output: null
    description: "Author has no effect on a null return"

  - name: "apple-logs"
    function: logs_dir
    args: { app: "MyApp" }
    strategy: "apple"
    platform: "macos"
    env: { HOME: "/Users/alice" }
    output: "$HOME/Library/Logs/MyApp"

  - name: "apple-runtime-is-null"
    function: runtime_dir
    args: { app: "MyApp" }
    strategy: "apple"
    platform: "macos"
    env: { HOME: "/Users/alice" }
    output: null
    description: "Apple has no runtime_dir concept; wheredirs returns null rather than aliasing to Caches (which lacks the 0700/session-lifetime guarantees a real runtime dir needs)"

  - name: "apple-config-with-author"
    function: config_dir
    args: { app: "MyApp", author: "Acme" }
    strategy: "apple"
    platform: "macos"
    env: { HOME: "/Users/alice" }
    output: "$HOME/Library/Application Support/Acme.MyApp"
    description: "Author and app dot-joined into a SINGLE path segment (matches Apple bundle-ID convention, not Windows-style nesting)"

  - name: "apple-cache-with-author"
    function: cache_dir
    args: { app: "MyApp", author: "Acme" }
    strategy: "apple"
    platform: "macos"
    env: { HOME: "/Users/alice" }
    output: "$HOME/Library/Caches/Acme.MyApp"
    description: "Dot-join applies to every kind, not just config"

  - name: "apple-logs-with-author"
    function: logs_dir
    args: { app: "MyApp", author: "Acme" }
    strategy: "apple"
    platform: "macos"
    env: { HOME: "/Users/alice" }
    output: "$HOME/Library/Logs/Acme.MyApp"
    description: "Author dot-joined with app into one segment under ~/Library/Logs"

  - name: "apple-config-reverse-dns-author"
    function: config_dir
    args: { app: "MyApp", author: "com.acme" }
    strategy: "apple"
    platform: "macos"
    env: { HOME: "/Users/alice" }
    output: "$HOME/Library/Application Support/com.acme.MyApp"
    description: "Reverse-DNS author yields a single bundle-ID-shaped segment, exactly as Apple recommends"

  - name: "apple-config-author-with-existing-dot"
    function: config_dir
    args: { app: "myapp", author: "io.github.acme" }
    strategy: "apple"
    platform: "macos"
    env: { HOME: "/Users/alice" }
    output: "$HOME/Library/Application Support/io.github.acme.myapp"
    description: "An author that already contains dots is dot-joined verbatim; wheredirs does not deduplicate or normalize"

  - name: "apple-config-author-omitted-falls-back"
    function: config_dir
    args: { app: "MyApp" }
    strategy: "apple"
    platform: "macos"
    env: { HOME: "/Users/alice" }
    output: "$HOME/Library/Application Support/MyApp"
    description: "Without author, the segment is just `app` (no leading dot, no synthesized prefix)"

  - name: "apple-app-with-space-preserved"
    function: config_dir
    args: { app: "My App" }
    strategy: "apple"
    platform: "macos"
    env: { HOME: "/Users/alice" }
    output: "$HOME/Library/Application Support/My App"
    description: "App name preserved verbatim on Apple (no mangling)"

  - name: "apple-ignores-xdg-env"
    function: config_dir
    args: { app: "MyApp" }
    strategy: "apple"
    platform: "macos"
    env:
      HOME: "/Users/alice"
      XDG_CONFIG_HOME: "/tmp/should-be-ignored"
    output: "$HOME/Library/Application Support/MyApp"
    description: "Apple strategy must not consult XDG_* env vars even when set"

  - name: "apple-explicit-on-linux"
    function: config_dir
    args: { app: "MyApp" }
    strategy: "apple"
    platform: "linux"
    env: { HOME: "/home/alice" }
    output: "$HOME/Library/Application Support/MyApp"
    description: "strategy='apple' on a non-macOS platform is legal; the strategy fully determines layout"

  - name: "apple-auto-on-macos"
    function: config_dir
    args: { app: "MyApp" }
    strategy: null
    platform: "macos"
    env: { HOME: "/Users/alice" }
    output: "$HOME/Library/Application Support/MyApp"
    description: "Auto-mode on macOS picks apple, the native layout"

  - name: "apple-auto-on-darwin"
    function: config_dir
    args: { app: "MyApp" }
    strategy: null
    platform: "darwin"
    env: { HOME: "/Users/alice" }
    output: "$HOME/Library/Application Support/MyApp"
    description: "darwin is an alias for macos"

# =============================================================================
# Windows strategy
# =============================================================================

windows:
  # ---- local (default) ------------------------------------------------------

  - name: "win-config-local-default"
    function: config_dir
    args: { app: "MyApp" }
    strategy: "windows"
    platform: "windows"
    env:
      LOCALAPPDATA: "C:/Users/alice/AppData/Local"
      USERPROFILE: ""
      HOME: ""
    output: "$LOCALAPPDATA/MyApp"

  - name: "win-data-local-default"
    function: data_dir
    args: { app: "MyApp" }
    strategy: "windows"
    platform: "windows"
    env:
      LOCALAPPDATA: "C:/Users/alice/AppData/Local"
      USERPROFILE: ""
      HOME: ""
    output: "$LOCALAPPDATA/MyApp"

  - name: "win-cache-suffix"
    function: cache_dir
    args: { app: "MyApp" }
    strategy: "windows"
    platform: "windows"
    env:
      LOCALAPPDATA: "C:/Users/alice/AppData/Local"
      USERPROFILE: ""
      HOME: ""
    output: "$LOCALAPPDATA/MyApp/Cache"

  - name: "win-state-is-null"
    function: state_dir
    args: { app: "MyApp" }
    strategy: "windows"
    platform: "windows"
    env:
      LOCALAPPDATA: "C:/Users/alice/AppData/Local"
      USERPROFILE: ""
      HOME: ""
    output: null
    description: "Windows has no Known Folder for state; wheredirs returns null rather than aliasing to data"

  - name: "win-logs-suffix"
    function: logs_dir
    args: { app: "MyApp" }
    strategy: "windows"
    platform: "windows"
    env:
      LOCALAPPDATA: "C:/Users/alice/AppData/Local"
      USERPROFILE: ""
      HOME: ""
    output: "$LOCALAPPDATA/MyApp/Logs"

  - name: "win-runtime-is-null"
    function: runtime_dir
    args: { app: "MyApp" }
    strategy: "windows"
    platform: "windows"
    env:
      LOCALAPPDATA: "C:/Users/alice/AppData/Local"
      USERPROFILE: ""
      HOME: ""
    output: null
    description: "Windows has no Known Folder for runtime files; wheredirs returns null rather than inventing a path"

  # ---- author segment -------------------------------------------------------

  - name: "win-config-with-author"
    function: config_dir
    args: { app: "MyApp", author: "Acme" }
    strategy: "windows"
    platform: "windows"
    env:
      LOCALAPPDATA: "C:/Users/alice/AppData/Local"
      USERPROFILE: ""
      HOME: ""
    output: "$LOCALAPPDATA/Acme/MyApp"

  - name: "win-logs-with-author"
    function: logs_dir
    args: { app: "MyApp", author: "Acme" }
    strategy: "windows"
    platform: "windows"
    env:
      LOCALAPPDATA: "C:/Users/alice/AppData/Local"
      USERPROFILE: ""
      HOME: ""
    output: "$LOCALAPPDATA/Acme/MyApp/Logs"
    description: "Author path-joined before app, Logs suffix appended last"

  # ---- env-var fallback chain -----------------------------------------------

  - name: "win-localappdata-unset-uses-userprofile"
    function: config_dir
    args: { app: "MyApp" }
    strategy: "windows"
    platform: "windows"
    env:
      LOCALAPPDATA: ""
      USERPROFILE: "C:/Users/alice"
      HOME: ""
    output: "$USERPROFILE/AppData/Local/MyApp"

  - name: "win-no-userprofile-falls-to-home"
    function: config_dir
    args: { app: "MyApp" }
    strategy: "windows"
    platform: "windows"
    env:
      LOCALAPPDATA: ""
      USERPROFILE: ""
      HOME: "C:/Users/alice"
    output: "$HOME/AppData/Local/MyApp"

  - name: "win-empty-localappdata-treated-as-unset"
    function: config_dir
    args: { app: "MyApp" }
    strategy: "windows"
    platform: "windows"
    env:
      LOCALAPPDATA: ""
      USERPROFILE: "C:/Users/alice"
      HOME: ""
    output: "$USERPROFILE/AppData/Local/MyApp"

  - name: "win-userprofile-trailing-slash-stripped"
    function: config_dir
    args: { app: "MyApp" }
    strategy: "windows"
    platform: "windows"
    env:
      LOCALAPPDATA: ""
      USERPROFILE: "C:/Users/alice/"
      HOME: ""
    output: "$USERPROFILE/AppData/Local/MyApp"
    description: "USERPROFILE is in the trailing-slash strip list per SPEC §Graceful handling"

  - name: "win-localappdata-trailing-slash-stripped"
    function: config_dir
    args: { app: "MyApp" }
    strategy: "windows"
    platform: "windows"
    env:
      LOCALAPPDATA: "C:/Users/alice/AppData/Local/"
      USERPROFILE: ""
      HOME: ""
    output: "$LOCALAPPDATA/MyApp"

  - name: "win-config-app-with-space-preserved"
    function: config_dir
    args: { app: "My App" }
    strategy: "windows"
    platform: "windows"
    env:
      LOCALAPPDATA: "C:/Users/alice/AppData/Local"
      USERPROFILE: ""
      HOME: ""
    output: "$LOCALAPPDATA/My App"
    description: "App name preserved verbatim on Windows (no mangling)"

  # ---- auto-mode on windows -------------------------------------------------

  - name: "win-auto-on-windows"
    function: config_dir
    args: { app: "MyApp", author: "Acme" }
    strategy: null
    platform: "windows"
    env:
      LOCALAPPDATA: "C:/Users/alice/AppData/Local"
      USERPROFILE: ""
      HOME: ""
    output: "$LOCALAPPDATA/Acme/MyApp"

  # ---- non-absolute env vars used verbatim (Windows, unlike XDG) ------------

  - name: "win-non-absolute-localappdata-verbatim"
    function: config_dir
    args: { app: "MyApp" }
    strategy: "windows"
    platform: "windows"
    env:
      LOCALAPPDATA: "relative/path"
      USERPROFILE: ""
      HOME: ""
    output: "$LOCALAPPDATA/MyApp"
    description: "Windows env vars are NOT validated for absoluteness; non-empty values are used verbatim. Contrast with XDG which treats non-absolute as unset."

  - name: "win-unc-localappdata-verbatim"
    function: config_dir
    args: { app: "MyApp" }
    strategy: "windows"
    platform: "windows"
    env:
      LOCALAPPDATA: "//server/share/AppData"
      USERPROFILE: ""
      HOME: ""
    output: "$LOCALAPPDATA/MyApp"
    description: "UNC-style paths in env vars are valid Windows paths and used verbatim"

  # ---- windows strategy on a non-windows platform ---------------------------

  - name: "win-explicit-on-macos"
    function: config_dir
    args: { app: "MyApp", author: "Acme" }
    strategy: "windows"
    platform: "macos"
    env:
      LOCALAPPDATA: "C:/Users/alice/AppData/Local"
      USERPROFILE: ""
      HOME: ""
    output: "$LOCALAPPDATA/Acme/MyApp"
    description: "strategy='windows' on macOS is legal; cross-compile scenario"

# =============================================================================
# Single-folder strategy
# =============================================================================

single-folder:
  - name: "single-config"
    function: config_dir
    args: { app: "myapp" }
    strategy: "single-folder"
    platform: "linux"
    env: { HOME: "/home/alice" }
    output: "$HOME/.myapp"

  - name: "single-data-same-folder"
    function: data_dir
    args: { app: "myapp" }
    strategy: "single-folder"
    platform: "linux"
    env: { HOME: "/home/alice" }
    output: "$HOME/.myapp"

  - name: "single-cache-same-folder"
    function: cache_dir
    args: { app: "myapp" }
    strategy: "single-folder"
    platform: "linux"
    env: { HOME: "/home/alice" }
    output: "$HOME/.myapp"

  - name: "single-state-same-folder"
    function: state_dir
    args: { app: "myapp" }
    strategy: "single-folder"
    platform: "linux"
    env: { HOME: "/home/alice" }
    output: "$HOME/.myapp"

  - name: "single-logs-same-folder"
    function: logs_dir
    args: { app: "myapp" }
    strategy: "single-folder"
    platform: "linux"
    env: { HOME: "/home/alice" }
    output: "$HOME/.myapp"

  - name: "single-runtime-same-folder"
    function: runtime_dir
    args: { app: "myapp" }
    strategy: "single-folder"
    platform: "linux"
    env: { HOME: "/home/alice" }
    output: "$HOME/.myapp"

  - name: "single-mangles-uppercase"
    function: config_dir
    args: { app: "MyApp" }
    strategy: "single-folder"
    platform: "linux"
    env: { HOME: "/home/alice" }
    output: "$HOME/.myapp"
    description: "Single-folder lowercases app"

  - name: "single-mangles-spaces"
    function: config_dir
    args: { app: "My App" }
    strategy: "single-folder"
    platform: "linux"
    env: { HOME: "/home/alice" }
    output: "$HOME/.my-app"
    description: "Single-folder replaces whitespace runs with -"

  - name: "single-collapses-multiple-spaces"
    function: config_dir
    args: { app: "My  App" }
    strategy: "single-folder"
    platform: "linux"
    env: { HOME: "/home/alice" }
    output: "$HOME/.my-app"
    description: "Runs of whitespace collapse to a single dash, not two"

  - name: "single-collapses-tabs-and-mixed-whitespace"
    function: config_dir
    args: { app: "My\tApp Name" }
    strategy: "single-folder"
    platform: "linux"
    env: { HOME: "/home/alice" }
    output: "$HOME/.my-app-name"
    description: "Tabs are whitespace too; each run becomes one dash"

  - name: "single-trims-leading-trailing-whitespace"
    function: config_dir
    args: { app: "  MyApp  " }
    strategy: "single-folder"
    platform: "linux"
    env: { HOME: "/home/alice" }
    output: "$HOME/.myapp"
    description: "Leading/trailing whitespace is trimmed before collapse, so no .-myapp- or .--myapp"

  - name: "single-author-ignored"
    function: config_dir
    args: { app: "myapp", author: "Acme" }
    strategy: "single-folder"
    platform: "linux"
    env: { HOME: "/home/alice" }
    output: "$HOME/.myapp"

# =============================================================================
# Errors
# =============================================================================

errors:
  - name: "err-bad-strategy"
    function: config_dir
    args: { app: "MyApp" }
    strategy: "freedesktop"
    platform: "linux"
    env: { HOME: "/home/alice" }
    raises: true
    description: "Unknown strategy value"

  - name: "err-empty-strategy"
    function: config_dir
    args: { app: "MyApp" }
    strategy: ""
    platform: "linux"
    env: { HOME: "/home/alice" }
    raises: true
    description: "Empty-string strategy is invalid (must be one of the four named strategies or None)"

  - name: "err-empty-app"
    function: config_dir
    args: { app: "" }
    strategy: "xdg"
    platform: "linux"
    env: { HOME: "/home/alice" }
    raises: true

  - name: "err-null-app"
    function: config_dir
    args: { app: null }
    strategy: "xdg"
    platform: "linux"
    env: { HOME: "/home/alice" }
    raises: true

  - name: "err-app-with-forward-slash"
    function: config_dir
    args: { app: "vendor/app" }
    strategy: "xdg"
    platform: "linux"
    env: { HOME: "/home/alice" }
    raises: true

  - name: "err-app-with-backslash"
    function: config_dir
    args: { app: "vendor\\app" }
    strategy: "windows"
    platform: "windows"
    env:
      LOCALAPPDATA: "C:/Users/alice/AppData/Local"
      USERPROFILE: ""
      HOME: ""
      USERPROFILE: "C:/Users/alice"
      HOME: ""
    raises: true
    description: "App-name validation must fire before env resolution; all env pinned to prove order-independence"

  - name: "err-app-with-backslash-on-linux"
    function: config_dir
    args: { app: "vendor\\app" }
    strategy: "xdg"
    platform: "linux"
    env: { HOME: "/home/alice" }
    raises: true
    description: "Backslash in app is rejected on every platform, not just Windows"

  - name: "err-which-strategy-unknown-platform"
    function: which_strategy
    args: ["plan9"]
    raises: true

  - name: "err-which-strategy-empty-string"
    function: which_strategy
    args: [""]
    raises: true

  - name: "err-which-strategy-null"
    function: which_strategy
    args: [null]
    raises: true

# =============================================================================
# Project-specific test cases
# =============================================================================
# Add cases that exercise YOUR app's exact identity / platform mix here. These
# are the cases most likely to catch a generated implementation getting the
# wiring almost-but-not-quite right for your real-world use.
#
# Replace / extend these with cases matching the apps you actually plan to
# use wheredirs in. Each case must declare function, args, strategy (or null),
# platform, env, and output (or raises: true).

project:
  # A typical CLI tool: same app, all three auto-mode platforms.
  - name: "wheredirs-self-config-linux"
    function: config_dir
    args: { app: "wheredirs" }
    strategy: null
    platform: "linux"
    env: { HOME: "/home/dev" }
    output: "$HOME/.config/wheredirs"

  - name: "wheredirs-self-config-macos-auto"
    function: config_dir
    args: { app: "wheredirs" }
    strategy: null
    platform: "macos"
    env: { HOME: "/Users/dev" }
    output: "$HOME/Library/Application Support/wheredirs"
    description: "macOS auto-mode picks the native Apple layout"

  - name: "wheredirs-self-config-macos-xdg-opt-in"
    function: config_dir
    args: { app: "wheredirs" }
    strategy: "xdg"
    platform: "macos"
    env: { HOME: "/Users/dev" }
    output: "$HOME/.config/wheredirs"
    description: "Cross-platform CLI tools that want one layout everywhere pass strategy='xdg' explicitly"

  - name: "wheredirs-self-config-macos-apple"
    function: config_dir
    args: { app: "wheredirs" }
    strategy: "apple"
    platform: "macos"
    env: { HOME: "/Users/dev" }
    output: "$HOME/Library/Application Support/wheredirs"

  - name: "wheredirs-self-config-windows"
    function: config_dir
    args: { app: "wheredirs", author: "hasansezertasan" }
    strategy: null
    platform: "windows"
    env:
      LOCALAPPDATA: "C:/Users/dev/AppData/Local"
      USERPROFILE: ""
      HOME: ""
    output: "$LOCALAPPDATA/hasansezertasan/wheredirs"

  # Author with spaces preserved verbatim through path-join on Windows.
  - name: "windows-author-with-space"
    function: logs_dir
    args: { app: "MyApp", author: "Acme Corp" }
    strategy: "windows"
    platform: "windows"
    env:
      LOCALAPPDATA: "C:/Users/dev/AppData/Local"
      USERPROFILE: ""
      HOME: ""
    output: "$LOCALAPPDATA/Acme Corp/MyApp/Logs"
    description: "Author with space + Logs suffix on Windows; space in author is preserved (Windows path-join is verbatim, no normalization)"

  # Headless server: XDG state with a custom XDG_STATE_HOME.
  - name: "server-state-custom-xdg"
    function: state_dir
    args: { app: "my-daemon" }
    strategy: "xdg"
    platform: "linux"
    env:
      HOME: "/var/lib/daemon"
      XDG_STATE_HOME: "/var/lib/daemon/state"
    output: "$XDG_STATE_HOME/my-daemon"

  # Single-folder for a legacy dotfile-style tool.
  - name: "dotfile-style-single-folder"
    function: data_dir
    args: { app: "Legacy Tool" }
    strategy: "single-folder"
    platform: "linux"
    env: { HOME: "/home/dev" }
    output: "$HOME/.legacy-tool"
    description: "single-folder lowercases and dash-replaces spaces"
