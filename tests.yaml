    strategy: "single-folder"
    platform: "linux"
    env: { HOME: "/home/alice" }
    output: "$HOME/.my-app-name"
    description: "Tabs are whitespace too; each run becomes one dash"

  - name: "single-trims-leading-trailing-whitespace"
    function: config_dir
    args: { app: "  MyApp  " }
    strategy: "single-folder"
    platform: "linux"
    env: { HOME: "/home/alice" }
    output: "$HOME/.myapp"
    description: "Leading/trailing whitespace is trimmed before collapse, so no .-myapp- or .--myapp"

  - name: "single-author-ignored"
    function: config_dir
    args: { app: "myapp", author: "Acme" }
    strategy: "single-folder"
    platform: "linux"
    env: { HOME: "/home/alice" }
    output: "$HOME/.myapp"

  - name: "single-all-transforms-combined"
    function: config_dir
